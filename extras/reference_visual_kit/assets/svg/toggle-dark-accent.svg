<svg xmlns="http://www.w3.org/2000/svg" width="76" height="42" viewBox="0 0 76 42">

<defs>
  <filter id="shadowLight" x="-20%" y="-20%" width="140%" height="160%">
    <feDropShadow dx="0" dy="3" stdDeviation="4" flood-color="#34404F" flood-opacity="0.16"/>
  </filter>
  <filter id="shadowDark" x="-20%" y="-20%" width="140%" height="160%">
    <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#171D26" flood-opacity="0.35"/>
  </filter>
  <linearGradient id="btnBlue" x1="0" x2="1">
    <stop offset="0%" stop-color="#2D78DD"/>
    <stop offset="100%" stop-color="#256ECA"/>
  </linearGradient>
  <linearGradient id="btnDark" x1="0" x2="1">
    <stop offset="0%" stop-color="#2E3744"/>
    <stop offset="100%" stop-color="#262E39"/>
  </linearGradient>
  <linearGradient id="folderBlue" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%" stop-color="#6BAAF1"/>
    <stop offset="100%" stop-color="#3484E9"/>
  </linearGradient>
  <linearGradient id="folderIce" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%" stop-color="#DCE9F8"/>
    <stop offset="100%" stop-color="#9ABBE4"/>
  </linearGradient>
  <linearGradient id="folderDarkGrad" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%" stop-color="#5A6576"/>
    <stop offset="100%" stop-color="#2A313D"/>
  </linearGradient>
  <linearGradient id="surfaceDarkPanel" x1="0" x2="1" y1="0" y2="1">
    <stop offset="0%" stop-color="#2E3642"/>
