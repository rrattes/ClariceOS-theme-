<g filter="url(#shadowDark)">
  <rect x="3" y="6" rx="15" ry="15" width="70" height="30" fill="url(#btnDark)" stroke="#2A313D"/>
  <circle cx="52" cy="21" r="13" fill="#77B7FF" stroke="#29313D"/>
</g>
</svg>
